spring:
  aplication:
    name: email
  datasource:
    url: jdbc:postgresql://localhost:5433/ms_email_ms
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${HOST}
    username: ${USERNAME}
    password: ${PASSWORD}
    virtual-host: ${VIRTUALHOST}

server:
  port: 8080